# ===========================================================================
# Nginx HTTPS Configuration for Care_4_U Hospitals (AWS EC2)
# ===========================================================================
#
# SETUP OPTIONS:
#
# Option A — Let's Encrypt (free, auto-renewing, trusted by all browsers):
#   1. Install certbot:
#        sudo apt install certbot python3-certbot-nginx
#   2. Obtain certificate (replace YOUR_DOMAIN with your actual domain):
#        sudo certbot --nginx -d YOUR_DOMAIN
#   3. Certbot will auto-modify this config to add SSL directives.
#   4. Auto-renewal is enabled by default via systemd timer.
#
# Option B — Self-Signed certificate (for testing / internal use):
#   1. Generate certificates:
#        sudo mkdir -p /etc/nginx/ssl
#        sudo openssl req -x509 -nodes -days 365 -newkey rsa:2048 \
#            -keyout /etc/nginx/ssl/key.pem \
#            -out /etc/nginx/ssl/cert.pem \
#            -subj "/CN=localhost"
#   2. Use this config as-is (it references /etc/nginx/ssl/).
#
# Option C — AWS ALB with ACM certificate (recommended for production):
#   1. Request a free SSL certificate from AWS Certificate Manager (ACM).
#   2. Attach it to your Application Load Balancer (ALB).
#   3. ALB terminates SSL; Nginx only needs HTTP (port 80).
#   4. Use the care4u_alb.conf file instead.
# ===========================================================================

# Redirect all HTTP traffic to HTTPS
server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge path (needed for cert renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server block
server {
    listen 443 ssl http2;
    server_name _;

    # ----- SSL Certificate Paths -----
    # Option A (Let's Encrypt): certbot will auto-fill these
    # ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    # include             /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Option B (Self-Signed): uncomment the two lines below
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # ----- SSL Hardening -----
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # ----- Security Headers -----
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 10M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml image/svg+xml;

    # Reverse proxy to Gunicorn (bound on localhost only)
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_redirect     off;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;
    }

    # Static files
    location /static {
        alias   /var/www/care4u/static;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Local uploads (if any remain local)
    location /uploads {
        alias   /var/www/care4u/instance/uploads;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Block hidden and env files
    location ~ /\. {
        deny all;
    }

    location ~* (\.env|\.ini|\.log|\.sqlite|\.db)$ {
        deny all;
    }
}
