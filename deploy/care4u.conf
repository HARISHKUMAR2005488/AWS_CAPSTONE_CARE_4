server {
    listen 80;
    server_name _;   # catches any IP or domain — replace _ with your domain if you have one

    # Proxy all requests to Gunicorn via Unix socket
    location / {
        proxy_pass         http://unix:/home/ec2-user/AWS_CAPSTONE_CARE_4/care4u.sock;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 90;
    }

    # Serve static files directly via Nginx (faster than Flask)
    location /static {
        alias   /home/ec2-user/AWS_CAPSTONE_CARE_4/static;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Serve uploaded files (profile pictures, documents)
    location /uploads {
        alias   /home/ec2-user/AWS_CAPSTONE_CARE_4/instance/uploads;
        expires 7d;
    }

    # Block access to hidden files (e.g. .env)
    location ~ /\. {
        deny all;
    }
}
