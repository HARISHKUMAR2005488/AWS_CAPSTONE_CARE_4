server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml image/svg+xml;

    # Respect upstream TLS termination (ALB/ELB) when forwarding scheme to Flask.
    set $forwarded_proto $scheme;
    if ($http_x_forwarded_proto = "https") {
        set $forwarded_proto "https";
    }

    # Redirect direct HTTP access to HTTPS when TLS is available.
    if ($forwarded_proto != "https") {
        return 301 https://$host$request_uri;
    }

    # Reverse proxy to Gunicorn (bound on localhost only)
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_redirect     off;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $forwarded_proto;
        proxy_read_timeout 90;
    }

    # Static files
    location /static {
        alias   /var/www/care4u/static;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Local uploads (if any remain local)
    location /uploads {
        alias   /var/www/care4u/instance/uploads;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Block hidden and env files
    location ~ /\. {
        deny all;
    }

    location ~* (\.env|\.ini|\.log|\.sqlite|\.db)$ {
        deny all;
    }
}
