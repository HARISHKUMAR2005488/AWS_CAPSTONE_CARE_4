# ===========================================================================
# Nginx Config for Care_4_U behind AWS Application Load Balancer (ALB)
# ===========================================================================
#
# Use this config when SSL is terminated at the ALB level using an
# AWS Certificate Manager (ACM) certificate. The ALB forwards HTTP
# traffic to this Nginx instance, which proxies to Gunicorn.
#
# ALB handles: SSL termination, certificate management, auto-renewal
# Nginx handles: reverse proxy to Gunicorn, static files, security headers
# ===========================================================================

server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    # Health check endpoint for ALB target group
    location /health {
        access_log off;
        return 200 "OK";
        add_header Content-Type text/plain;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml image/svg+xml;

    # Security headers (HSTS is added by Flask when X-Forwarded-Proto is https)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Reverse proxy to Gunicorn
    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_redirect     off;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 90;
    }

    # Static files
    location /static {
        alias   /var/www/care4u/static;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
    }

    # Local uploads
    location /uploads {
        alias   /var/www/care4u/instance/uploads;
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Block hidden and env files
    location ~ /\. {
        deny all;
    }

    location ~* (\.env|\.ini|\.log|\.sqlite|\.db)$ {
        deny all;
    }
}
